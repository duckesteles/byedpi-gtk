name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flatpak:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v7

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: byedpi-gtk-${{ matrix.arch }}.flatpak
          manifest-path: build-aux/flatpak/io.github.duckesteles.byedpigtk.yml
          cache-key: flatpak-builder-${{ github.sha }}-${{ matrix.arch }}
          arch: ${{ matrix.arch }}

      - name: Upload bundle
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release'
        with:
          files: byedpi-gtk-${{ matrix.arch }}.flatpak

  appimage:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    env:
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build gettext desktop-file-utils \
            libgtk-4-dev libadwaita-1-dev python3-gi \
            libfuse2 curl file

      - name: Build AppImage
        run: bash packaging/appimage/build.sh

      - name: Upload AppImage
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release'
        with:
          files: byedpi-gtk-${{ matrix.arch }}.AppImage

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build gettext desktop-file-utils \
            libgtk-4-dev libadwaita-1-dev python3-gi dpkg-dev curl

      - name: Build deb
        run: bash packaging/debian/build.sh

      - name: Upload deb
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release'
        with:
          files: byedpi-gtk_*_all.deb

  pacman:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install build tooling
        run: |
          pacman -Syu --noconfirm base-devel meson ninja glib2 gtk4 \
            libadwaita python-gobject git

      - uses: actions/checkout@v7

      - name: Stage local source tarball
        run: |
          git config --global --add safe.directory "$PWD"
          PKGVER=$(sed -n "s/^pkgver=//p" packaging/aur/PKGBUILD)
          mkdir -p "build-pacman/byedpi-gtk-$PKGVER"
          git archive --format=tar HEAD | tar -x -C "build-pacman/byedpi-gtk-$PKGVER"
          tar -czf "build-pacman/byedpi-gtk-$PKGVER.tar.gz" \
            -C build-pacman "byedpi-gtk-$PKGVER"
          cp packaging/aur/PKGBUILD build-pacman/PKGBUILD
          sed -i "s#^source=(.*#source=(\"byedpi-gtk-\$pkgver.tar.gz\")#" build-pacman/PKGBUILD
          useradd -m builder
          chown -R builder:builder build-pacman

      - name: Build package
        run: |
          su builder -c 'cd '"$PWD"'/build-pacman && makepkg -f --noconfirm --skipinteg'
          cp build-pacman/*.pkg.tar.zst .

      - name: Upload package
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release'
        with:
          files: '*.pkg.tar.zst'
